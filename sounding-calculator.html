<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sounding Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 6px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-unit {
            color: #999;
            font-size: 16px;
        }

        .error {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚓ Sounding Calculator</h1>

        <form id="calculator">
            <div class="form-group">
                <label for="tank">Tank</label>
                <select id="tank" required>
                    <option value="">Velg tank...</option>
                    <option value="Pur.Sludge tk Stb">Purification Sludge Tank - Starboard</option>
                    <option value="Pur.Sludge tk Port">Purification Sludge Tank - Port</option>
                    <option value="Sep.Bilge Oil Tk Stb">Separated Bilge Oil Tank - Starboard</option>
                    <option value="Sep.Bilge Oil Tk Port">Separated Bilge Oil Tank - Port</option>
                </select>
            </div>

            <div class="form-group">
                <label for="trim">Trim (meter)</label>
                <input type="number" id="trim" placeholder="0" step="0.1" min="-1" max="5" required>
                <div class="info">-1 til 5 meter</div>
                <div class="error" id="trimError"></div>
            </div>

            <div class="form-group">
                <label for="sounding">Sounding (cm)</label>
                <input type="number" id="sounding" placeholder="0" step="0.1" min="0" required>
                <div class="error" id="soundingError"></div>
            </div>

            <button type="submit">Beregn volum</button>
        </form>

        <div class="result" id="result">
            <div class="result-label">Tankvolum</div>
            <div class="result-value"><span id="volume">0</span><span class="result-unit">m³</span></div>
        </div>
    </div>

        const trimValues = [-1, 0, 1, 2, 3, 4, 5];

        function interpolateLinear(x0, y0, x1, y1, x) {
            return y0 + (y1 - y0) * (x - x0) / (x1 - x0);
        }

        function calculateVolume(tank, trim, sounding) {
            const data = tankData[tank];
            if (!data) throw new Error('Tank not found');

            const soundingInt = Math.floor(sounding);
            const soundingFrac = sounding - soundingInt;

            // Get sounding values (interpolate vertically if needed)
            let v1_base, v1_next, v2_base, v2_next;

            // Get volumes for the two nearest trim values
            const trimIndex = trimValues.findIndex(t => t >= trim);

            if (trimIndex === -1 || trimIndex === 0) {
                // Trim is outside range
                return null;
            }

            const trim0 = trimValues[trimIndex - 1];
            const trim1 = trimValues[trimIndex];

            // Get data for these trim values
            const row0 = data[soundingInt.toString()];
            const row1 = data[(soundingInt + 1).toString()];

            if (!row0 || !row1) return null;

            const idx0 = trimIndex - 1;
            const idx1 = trimIndex;

            // Interpolate at sounding level for both trim values
            const v0_at_trim0 = interpolateLinear(soundingInt, row0[idx0], soundingInt + 1, row1[idx0], sounding);
            const v0_at_trim1 = interpolateLinear(soundingInt, row0[idx1], soundingInt + 1, row1[idx1], sounding);

            // Interpolate between trim values
            const volume = interpolateLinear(trim0, v0_at_trim0, trim1, v0_at_trim1, trim);

            return volume;
        }

        document.getElementById('calculator').addEventListener('submit', (e) => {
            e.preventDefault();

            const tank = document.getElementById('tank').value;
            const trim = parseFloat(document.getElementById('trim').value);
            const sounding = parseFloat(document.getElementById('sounding').value);

            // Validation
            const trimError = document.getElementById('trimError');
            const soundingError = document.getElementById('soundingError');
            trimError.classList.remove('show');
            soundingError.classList.remove('show');

            if (trim < -1 || trim > 5) {
                trimError.textContent = 'Trim må være mellom -1 og 5 meter';
                trimError.classList.add('show');
                return;
            }

            try {
                const volume = calculateVolume(tank, trim, sounding);

                if (volume === null) {
                    soundingError.textContent = 'Sounding er utenfor dataenes område';
                    soundingError.classList.add('show');
                    return;
                }

                document.getElementById('volume').textContent = volume.toFixed(2);
                document.getElementById('result').classList.add('show');
            } catch (err) {
                soundingError.textContent = 'Feil ved beregning: ' + err.message;
                soundingError.classList.add('show');
            }
